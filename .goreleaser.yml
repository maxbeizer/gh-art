project_name: gh-art

builds:
  - binary: gh-art
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: binary
    name_template: "{{ .ProjectName }}_{{ .Os }}-{{ .Arch }}"

release:
  prerelease: auto

changelog:
  sort: asc
